<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Digital Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .header-gradient { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
        .card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 1px 3px rgb(0 0 0 / 0.1); }
        .btn-gradient-green { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .btn-gradient-red { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .kunci { filter: blur(6px); pointer-events: none; }
        #tabNav::-webkit-scrollbar { display: none; }
        #tabNav { -ms-overflow-style: none; scrollbar-width: none; }
        @media print { .no-print { display: none; } body { background: white; } }
    </style>
</head>
<body class="text-slate-800">

<div id="popupKunci" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
    <div class="card rounded-2xl p-8 max-w-sm text-center">
        <i class="fa-solid fa-lock text-5xl text-red-500 mb-4"></i>
        <h1 class="text-2xl font-bold text-red-600 mb-2">APLIKASI TERKUNCI</h1>
        <p class="text-slate-600">Masa sewa <span id="kodeLisensiPopup"></span> berakhir.</p>
        <p class="mt-4 text-sm text-slate-500">Hubungi Admin: 0812-3456-7890</p>
    </div>
</div>

<div id="popupLogin" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
    <div class="card rounded-2xl p-6 max-w-sm w-full">
        <h1 class="text-xl font-bold text-green-600 mb-4"><i class="fa-solid fa-user-shield mr-2"></i>Login Bos</h1>
        <input type="password" id="inputPin" placeholder="Masukkan PIN Bos" class="w-full bg-slate-100 border border-slate-300 rounded-xl p-3 mb-4 text-slate-800">
        <div class="flex gap-2">
            <button onclick="tutupLogin()" class="flex-1 bg-slate-200 text-slate-700 py-2 rounded-xl font-semibold">Batal</button>
            <button onclick="prosesLogin()" class="flex-1 bg-green-600 text-white py-2 rounded-xl font-semibold">Masuk</button>
        </div>
        <p id="errorPin" class="text-red-500 text-sm mt-2 hidden">PIN Salah!</p>
    </div>
</div>

<div id="app" class="max-w-4xl mx-auto p-3 min-h-screen">
    <div class="header-gradient rounded-2xl p-4 mb-4 shadow-lg">
        <div class="flex flex-wrap items-start justify-between gap-3">
            <div class="flex items-center gap-3 flex-1 min-w-0">
                <div class="w-10 h-10 rounded-xl bg-white p-1 text-xl flex items-center justify-center flex-shrink-0">☕</div>
                <div class="min-w-0">
                    <h1 class="text-xl font-bold text-white truncate" id="judulUtama">Absen Pro UMKM</h1>
                    <p class="text-xs text-green-100" id="infoLisensi">Selamat bekerja!</p>
                </div>
            </div>
            <div class="flex-shrink-0">
                <button id="btnLoginBos" onclick="bukaLogin()" class="bg-white/20 text-white px-3 py-2 rounded-xl text-xs font-semibold no-print">
                    <i class="fa-solid fa-user-shield mr-1"></i>Login Bos
                </button>
                <button id="btnLogout" onclick="logout()" class="bg-red-500/80 text-white px-3 py-2 rounded-xl text-xs font-semibold no-print hidden">
                    <i class="fa-solid fa-right-from-bracket mr-1"></i>Logout
                </button>
            </div>
        </div>
    </div>

    <div id="tabNav" class="flex gap-2 mb-4 overflow-x-auto no-print pb-2">
        <button onclick="gantiTab('absen')" id="btnAbsen" class="tab-btn bg-green-600 text-white px-4 py-2 rounded-xl font-semibold text-sm whitespace-nowrap"><i class="fa-solid fa-camera mr-1"></i>Absen</button>
        <button onclick="gantiTab('rekap')" id="btnRekap" class="tab-btn card px-4 py-2 rounded-xl font-semibold text-sm whitespace-nowrap hidden"><i class="fa-solid fa-list-check mr-1"></i>Rekap</button>
        <button onclick="gantiTab('gaji')" id="btnGaji" class="tab-btn card px-4 py-2 rounded-xl font-semibold text-sm whitespace-nowrap hidden"><i class="fa-solid fa-money-bill-wave mr-1"></i>Gaji</button>
        <button onclick="gantiTab('setting')" id="btnSetting" class="tab-btn card px-4 py-2 rounded-xl font-semibold text-sm whitespace-nowrap hidden"><i class="fa-solid fa-gear mr-1"></i>Setting</button>
    </div>

    <div id="tabAbsen" class="tab-content card rounded-2xl p-4">
        <h2 class="font-bold text-base mb-3"><i class="fa-solid fa-user-clock text-green-600 mr-2"></i>Absen Hari Ini</h2>
        <select id="pilihKaryawan" class="w-full bg-slate-100 border border-slate-300 rounded-xl p-3 mb-3 text-slate-800 text-sm"></select>
        
        <div id="areaKamera" class="relative mb-3">
            <video id="video" class="w-full rounded-xl bg-black aspect-video object-cover" autoplay playsinline muted></video>
            <div id="statusGPS" class="absolute bottom-2 left-2 bg-black/60 px-2 py-1 rounded-lg text-xs text-white hidden"><i class="fa-solid fa-location-dot mr-1"></i>GPS Aktif</div>
            <div id="errorKamera" class="absolute inset-0 bg-slate-100 rounded-xl flex flex-col items-center justify-center text-center p-4 hidden">
                <i class="fa-solid fa-video-slash text-2xl text-red-500 mb-2"></i>
                <p class="text-xs">Kamera/GPS gagal. Pastikan HTTPS aktif.</p>
                <button onclick="initKamera()" class="mt-2 bg-green-600 text-white px-3 py-1 rounded-lg text-xs">Coba Lagi</button>
            </div>
        </div>
        <canvas id="canvas" class="hidden"></canvas>
        
        <button id="btnAbsenMasuk" onclick="prosesAbsen('masuk')" class="w-full btn-gradient-green text-white py-3 rounded-xl font-bold text-base mb-2 disabled:opacity-50 disabled:cursor-not-allowed"><i class="fa-solid fa-right-to-bracket mr-2"></i>ABSEN MASUK</button>
        <button id="btnAbsenPulang" onclick="prosesAbsen('pulang')" class="w-full btn-gradient-red text-white py-3 rounded-xl font-bold text-base hidden"><i class="fa-solid fa-right-from-bracket mr-2"></i>ABSEN PULANG</button>
        <p id="statusAbsen" class="text-xs text-center mt-2 text-slate-500"></p>
    </div>

    <div id="tabRekap" class="tab-content card rounded-2xl p-4 hidden">
        <div class="flex justify-between items-center mb-3">
            <h2 class="font-bold text-base"><i class="fa-solid fa-calendar-day text-green-600 mr-2"></i>Rekap <span id="tglHariIni"></span></h2>
            <button onclick="exportExcel()" class="bg-green-600 text-white px-3 py-1 rounded-lg text-xs no-print"><i class="fa-solid fa-file-excel mr-1"></i>Excel</button>
        </div>
        <div id="alertBos"></div>
        <div id="rekapMobile" class="space-y-2 md:hidden"></div>
        <div class="overflow-x-auto hidden md:block">
            <table class="w-full text-sm">
                <thead class="text-slate-500 border-b border-slate-200">
                    <tr><th class="p-2 text-left">Nama</th><th>Masuk</th><th>Pulang</th><th>Status</th><th>Telat</th><th>Foto</th></tr>
                </thead>
                <tbody id="tabelRekap"></tbody>
            </table>
        </div>
    </div>

    <div id="tabGaji" class="tab-content card rounded-2xl p-4 hidden">
        <h2 class="font-bold text-base mb-3"><i class="fa-solid fa-file-invoice-dollar text-green-600 mr-2"></i>Slip Gaji</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-3 no-print">
            <select id="pilihKaryawanGaji" class="bg-slate-100 border border-slate-300 rounded-xl p-2 text-slate-800 text-sm"></select>
            <input type="month" id="pilihBulan" class="bg-slate-100 border border-slate-300 rounded-xl p-2 text-slate-800 text-sm">
            <button onclick="hitungGaji()" class="bg-green-600 text-white rounded-xl font-semibold text-sm">Hitung</button>
        </div>
        <div id="hasilGaji" class="bg-slate-50 rounded-xl p-3 hidden">
            <h3 class="font-bold mb-2 text-center text-sm">SLIP GAJI - <span id="namaKaryawanGaji"></span></h3>
            <div id="rincianGaji" class="text-xs space-y-1"></div>
            <button onclick="window.print()" class="mt-3 w-full bg-green-600 text-white py-2 rounded-lg font-semibold text-sm no-print">Print</button>
        </div>
    </div>

    <div id="tabSetting" class="tab-content card rounded-2xl p-4 hidden">
        <h2 class="font-bold text-base mb-3"><i class="fa-solid fa-sliders text-green-600 mr-2"></i>Setting</h2>
        <div id="listKaryawan" class="space-y-2 mb-4"></div>
        <div class="grid grid-cols-4 gap-2 mb-4">
            <input id="namaKaryawanBaru" placeholder="Nama" class="bg-slate-100 border border-slate-300 rounded-lg p-2 text-sm col-span-2">
            <input id="jamMasukBaru" type="time" class="bg-slate-100 border border-slate-300 rounded-lg p-2 text-sm">
            <button onclick="tambahKaryawan()" class="bg-green-600 text-white rounded-lg font-semibold"><i class="fa-solid fa-plus"></i></button>
        </div>
    </div>
</div>

<script>
let DB = JSON.parse(localStorage.getItem('DB_ABSEN_PRO')) || {
    settings: { 
        NAMA_USAHA:"USAHA ANDA",
        KODE_LISENSI:"PRO-2026",
        TANGGAL_AKTIFASI: new Date().toISOString().slice(0,10),
        MASA_SEWA_HARI:365, 
        GAJI_HARIAN:80000, 
        DENDA_TELAT_PER_MENIT:500, 
        UPAH_LEMBUR_PER_JAM:15000, 
        JAM_KERJA_STANDAR:8, 
        PIN_ADMIN:"1234"
    },
    karyawan: [{id:1,nama:"Contoh User",jamMasuk:"08:00",jamPulang:"16:00"}],
    absensi: [], kasbon: []
};

const simpanDB = () => localStorage.setItem('DB_ABSEN_PRO', JSON.stringify(DB));

let isAdmin = sessionStorage.getItem('isAdmin') === 'true';
let kameraSiap = false, gpsSiap = false, videoStream = null;

// KAMERA & GPS
async function initKamera() {
    const video = document.getElementById('video');
    const errorEl = document.getElementById('errorKamera');
    errorEl.classList.add('hidden');

    try {
        // Cek GPS dulu
        await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
        gpsSiap = true;
        document.getElementById('statusGPS').classList.remove('hidden');

        // Cek Kamera
        const constraints = { video: { facingMode: "user" } };
        videoStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = videoStream;
        
        video.onloadedmetadata = () => {
            kameraSiap = true;
            video.play();
            updateTampilanAbsen();
        };
    } catch (err) {
        console.error(err);
        errorEl.classList.remove('hidden');
        document.getElementById('statusAbsen').textContent = "Kamera/Lokasi ditolak.";
    }
}

function captureFoto() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    return canvas.toDataURL('image/jpeg', 0.5);
}

function prosesAbsen(tipe) {
    if (!kameraSiap) return alert('Kamera belum siap');
    const idK = parseInt(document.getElementById('pilihKaryawan').value);
    if (!idK) return alert('Pilih nama karyawan dulu');

    const foto = captureFoto();
    const now = new Date();
    const tgl = now.toISOString().slice(0,10);
    const jam = now.toTimeString().slice(0,8);

    let absen = DB.absensi.find(a => a.idKaryawan == idK && a.tanggal == tgl);
    const k = DB.karyawan.find(x => x.id == idK);

    if (tipe === 'masuk') {
        if (absen) return alert('Sudah absen masuk!');
        const [h, m] = jam.split(':'), [sh, sm] = k.jamMasuk.split(':');
        const telat = Math.max(0, (parseInt(h)*60+parseInt(m)) - (parseInt(sh)*60+parseInt(sm)));
        DB.absensi.push({id:Date.now(), idKaryawan:idK, tanggal:tgl, jamMasuk:jam, fotoMasuk:foto, status:telat>0?'Telat':'Hadir', telatMenit:telat});
    } else {
        if (!absen || absen.jamPulang) return alert('Belum masuk/sudah pulang');
        absen.jamPulang = jam;
        absen.fotoPulang = foto;
    }

    simpanDB();
    alert(`Berhasil Absen ${tipe}!`);
    updateTampilanAbsen();
    if(isAdmin) renderRekap();
}

// LOGIN SYSTEM
function bukaLogin() { document.getElementById('popupLogin').classList.remove('hidden'); }
function tutupLogin() { document.getElementById('popupLogin').classList.add('hidden'); }
function prosesLogin() {
    const pin = document.getElementById('inputPin').value;
    if (pin === DB.settings.PIN_ADMIN) {
        isAdmin = true;
        sessionStorage.setItem('isAdmin', 'true');
        tutupLogin();
        updateTampilanMode();
        gantiTab('rekap');
    } else {
        document.getElementById('errorPin').classList.remove('hidden');
    }
}
function logout() {
    isAdmin = false;
    sessionStorage.removeItem('isAdmin');
    updateTampilanMode();
    gantiTab('absen');
}

function updateTampilanMode() {
    document.getElementById('btnLoginBos').classList.toggle('hidden', isAdmin);
    document.getElementById('btnLogout').classList.toggle('hidden', !isAdmin);
    ['btnRekap','btnGaji','btnSetting'].forEach(id => {
        document.getElementById(id).classList.toggle('hidden', !isAdmin);
    });
    if (isAdmin) {
        renderRekap();
        renderSetting();
    }
}

function gantiTab(nama) {
    if (!isAdmin && nama !== 'absen') return;
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(el => {
        el.classList.remove('bg-green-600', 'text-white');
        el.classList.add('card');
    });
    
    const targetTab = 'tab' + nama.charAt(0).toUpperCase() + nama.slice(1);
    const targetBtn = 'btn' + nama.charAt(0).toUpperCase() + nama.slice(1);
    
    document.getElementById(targetTab).classList.remove('hidden');
    document.getElementById(targetBtn).classList.add('bg-green-600', 'text-white');
    document.getElementById(targetBtn).classList.remove('card');
}

function updateTampilanAbsen() {
    const idK = parseInt(document.getElementById('pilihKaryawan').value);
    const tgl = new Date().toISOString().slice(0,10);
    const absen = DB.absensi.find(a => a.idKaryawan == idK && a.tanggal == tgl);
    
    document.getElementById('btnAbsenMasuk').classList.toggle('hidden', !!absen);
    document.getElementById('btnAbsenPulang').classList.toggle('hidden', !absen || !!absen.jamPulang);
}

function renderRekap() {
    const tgl = new Date().toISOString().slice(0,10);
    document.getElementById('tglHariIni').textContent = tgl;
    const list = DB.karyawan.map(k => {
        const a = DB.absensi.find(x => x.idKaryawan == k.id && x.tanggal == tgl);
        return `<div class="card p-3 rounded-xl mb-2 text-sm">
            <b>${k.nama}</b> - ${a ? a.status : 'Alpha'}<br>
            <span class="text-xs">Masuk: ${a?.jamMasuk || '-'} | Pulang: ${a?.jamPulang || '-'}</span>
        </div>`;
    }).join('');
    document.getElementById('rekapMobile').innerHTML = list;
}

function loadDropdown() {
    const opsi = DB.karyawan.map(k => `<option value="${k.id}">${k.nama}</option>`).join('');
    ['pilihKaryawan','pilihKaryawanGaji'].forEach(id => {
        document.getElementById(id).innerHTML = '<option value="">Pilih Karyawan</option>' + opsi;
    });
}

function renderSetting() {
    document.getElementById('listKaryawan').innerHTML = DB.karyawan.map(k => `
        <div class="flex justify-between p-2 bg-slate-100 rounded mb-1">
            <span>${k.nama} (${k.jamMasuk})</span>
            <button onclick="hapusKaryawan(${k.id})" class="text-red-500"><i class="fa-solid fa-trash"></i></button>
        </div>
    `).join('');
}

function tambahKaryawan() {
    const nama = document.getElementById('namaKaryawanBaru').value;
    const jam = document.getElementById('jamMasukBaru').value;
    if(!nama || !jam) return alert('Isi data!');
    DB.karyawan.push({id: Date.now(), nama, jamMasuk: jam});
    simpanDB(); renderSetting(); loadDropdown();
}

function hapusKaryawan(id) {
    DB.karyawan = DB.karyawan.filter(k => k.id !== id);
    simpanDB(); renderSetting(); loadDropdown();
}

window.onload = () => {
    loadDropdown();
    updateTampilanMode();
    initKamera();
    document.getElementById('pilihKaryawan').addEventListener('change', updateTampilanAbsen);
};
</script>
</body>
</html>
