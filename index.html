<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absen Cafe Gen Z</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
    body { font-family: 'Poppins', sans-serif; background: #0f172a; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    .kunci { filter: blur(6px); pointer-events: none; }
</style>
</head>
<body class="text-gray-200">

<!-- POPUP KUNCI -->
<div id="popupKunci" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
    <div class="glass rounded-2xl p-8 max-w-sm text-center">
        <i class="fa-solid fa-lock text-5xl text-red-500 mb-4"></i>
        <h1 class="text-2xl font-bold text-red-400 mb-2">APLIKASI TERKUNCI</h1>
        <p class="text-gray-300">Masa sewa <span id="kodeLisensiPopup"></span> berakhir.</p>
        <p class="mt-4 text-sm text-gray-400">Hubungi Admin: 0812-3456-7890</p>
    </div>
</div>

<div id="app" class="max-w-4xl mx-auto p-4 min-h-screen">
    <!-- HEADER -->
    <div class="glass rounded-2xl p-5 mb-6 bg-gradient-to-r from-indigo-600/30 to-purple-600/30">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-mug-hot text-3xl text-amber-400"></i>
            <div>
                <h1 class="text-2xl font-bold" id="judulUtama">Cafe Gen Z</h1>
                <p class="text-sm text-gray-400" id="infoLisensi">Memuat...</p>
            </div>
        </div>
    </div>

    <!-- TAB NAV - HILANG KALO MODE KARYAWAN -->
    <div id="tabNav" class="flex gap-2 mb-6 overflow-x-auto">
        <button onclick="gantiTab('absen')" id="btnAbsen" class="tab-btn bg-indigo-600 text-white px-5 py-2 rounded-xl font-semibold whitespace-nowrap"><i class="fa-solid fa-camera mr-2"></i>Absen</button>
        <button onclick="gantiTab('rekap')" id="btnRekap" class="tab-btn glass px-5 py-2 rounded-xl font-semibold whitespace-nowrap"><i class="fa-solid fa-list-check mr-2"></i>Rekap</button>
        <button onclick="gantiTab('gaji')" id="btnGaji" class="tab-btn glass px-5 py-2 rounded-xl font-semibold whitespace-nowrap"><i class="fa-solid fa-money-bill-wave mr-2"></i>Gaji</button>
        <button onclick="gantiTab('setting')" id="btnSetting" class="tab-btn glass px-5 py-2 rounded-xl font-semibold whitespace-nowrap"><i class="fa-solid fa-gear mr-2"></i>Setting</button>
    </div>

    <!-- TAB 1: ABSEN -->
    <div id="tabAbsen" class="tab-content glass rounded-2xl p-6">
        <h2 class="font-bold text-lg mb-4"><i class="fa-solid fa-user-clock text-indigo-400 mr-2"></i>Absen Hari Ini</h2>
        <select id="pilihKaryawan" class="w-full bg-slate-800 border-slate-700 rounded-xl p-3 mb-4 text-white"></select>
        <div class="relative">
            <video id="video" class="w-full rounded-xl bg-black mb-4 aspect-video object-cover" autoplay playsinline></video>
            <div class="absolute bottom-3 left-3 bg-black/50 px-3 py-1 rounded-lg text-xs"><i class="fa-solid fa-location-dot mr-1"></i>GPS Aktif</div>
        </div>
        <canvas id="canvas" class="hidden"></canvas>
        <button id="btnAbsenMasuk" onclick="prosesAbsen('masuk')" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-4 rounded-xl font-bold text-lg mb-2"><i class="fa-solid fa-right-to-bracket mr-2"></i>ABSEN MASUK</button>
        <button id="btnAbsenPulang" onclick="prosesAbsen('pulang')" class="w-full bg-gradient-to-r from-red-500 to-orange-600 text-white py-4 rounded-xl font-bold text-lg hidden"><i class="fa-solid fa-right-from-bracket mr-2"></i>ABSEN PULANG</button>
        <p id="statusAbsen" class="text-sm text-center mt-3 text-gray-400"></p>
    </div>

    <!-- TAB 2: REKAP -->
    <div id="tabRekap" class="tab-content glass rounded-2xl p-6 hidden">
        <h2 class="font-bold text-lg mb-4"><i class="fa-solid fa-calendar-day text-indigo-400 mr-2"></i>Rekap <span id="tglHariIni"></span></h2>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="text-gray-400 border-b border-slate-700">
                    <tr><th class="p-3 text-left">Nama</th><th>Masuk</th><th>Pulang</th><th>Status</th><th>Telat</th><th>Foto</th></tr>
                </thead>
                <tbody id="tabelRekap"></tbody>
            </table>
        </div>
    </div>

    <!-- TAB 3: GAJI -->
    <div id="tabGaji" class="tab-content glass rounded-2xl p-6 hidden">
        <h2 class="font-bold text-lg mb-4"><i class="fa-solid fa-file-invoice-dollar text-indigo-400 mr-2"></i>Slip Gaji Bulanan</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
            <select id="pilihKaryawanGaji" class="bg-slate-800 border border-slate-700 rounded-xl p-3 text-white"></select>
            <input type="month" id="pilihBulan" class="bg-slate-800 border border-slate-700 rounded-xl p-3 text-white">
            <button onclick="hitungGaji()" class="bg-indigo-600 text-white rounded-xl font-semibold"><i class="fa-solid fa-calculator mr-2"></i>Hitung</button>
        </div>
        <div id="hasilGaji" class="glass rounded-xl p-4 hidden">
            <h3 class="font-bold mb-3 text-center">SLIP GAJI - <span id="namaKaryawanGaji"></span></h3>
            <div id="rincianGaji" class="text-sm space-y-2"></div>
            <button onclick="window.print()" class="mt-4 w-full bg-green-600 text-white py-2 rounded-lg font-semibold"><i class="fa-solid fa-print mr-2"></i>Print / PDF</button>
        </div>
        <div class="mt-8 border-t border-slate-700 pt-4">
            <h3 class="font-bold mb-3"><i class="fa-solid fa-hand-holding-dollar text-orange-400 mr-2"></i>Catat Kasbon</h3>
            <div class="flex gap-2">
                <select id="pilihKaryawanKasbon" class="bg-slate-800 border border-slate-700 rounded-xl p-3 flex-1 text-white"></select>
                <input type="number" id="jumlahKasbon" placeholder="Jumlah" class="bg-slate-800 border border-slate-700 rounded-xl p-3 w-32 text-white">
                <button onclick="tambahKasbon()" class="bg-orange-600 text-white px-4 rounded-xl font-semibold">Simpan</button>
            </div>
        </div>
    </div>

    <!-- TAB 4: SETTING -->
    <div id="tabSetting" class="tab-content glass rounded-2xl p-6 hidden">
        <h2 class="font-bold text-lg mb-4"><i class="fa-solid fa-sliders text-indigo-400 mr-2"></i>Setting Gaji & Karyawan</h2>
        <div class="grid grid-cols-2 gap-4 text-sm mb-6">
            <div><label class="text-gray-400">Gaji Harian</label><input id="setGajiHarian" type="number" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 mt-1 text-white"></div>
            <div><label class="text-gray-400">Denda/menit</label><input id="setDendaTelat" type="number" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 mt-1 text-white"></div>
            <div><label class="text-gray-400">Lembur/jam</label><input id="setUpahLembur" type="number" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 mt-1 text-white"></div>
            <div><label class="text-gray-400">Jam Kerja</label><input id="setJamKerja" type="number" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 mt-1 text-white"></div>
        </div>
        <button onclick="simpanSetting()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold mb-6">Simpan Setting</button>
        
        <h3 class="font-bold mb-3">Data Karyawan</h3>
        <div id="listKaryawan" class="space-y-2 mb-3"></div>
        <div class="grid grid-cols-4 gap-2">
            <input id="namaKaryawanBaru" placeholder="Nama" class="bg-slate-800 border border-slate-700 rounded-lg p-2 text-white col-span-2">
            <input id="jamMasukBaru" type="time" class="bg-slate-800 border border-slate-700 rounded-lg p-2 text-white">
            <button onclick="tambahKaryawan()" class="bg-green-600 text-white rounded-lg font-semibold"><i class="fa-solid fa-plus"></i></button>
        </div>
    </div>
</div>

<script>
// ===== 1. DATABASE =====
let DB = JSON.parse(localStorage.getItem('DB_ABSEN_GENZ')) || {
    settings: {
        NAMA_USAHA: "CAFE GEN Z",
        KODE_LISENSI: "ABS-GNZ-01",
        TANGGAL_AKTIFASI: "2026-05-03",
        MASA_SEWA_HARI: 30,
        GAJI_HARIAN: 80000,
        DENDA_TELAT_PER_MENIT: 500,
        UPAH_LEMBUR_PER_JAM: 15000,
        JAM_KERJA_STANDAR: 8,
        PIN_ADMIN: "1234"
    },
    karyawan: [
        { id: 1, nama: "Budi", jamMasuk: "08:00", jamPulang: "16:00" },
        { id: 2, nama: "Sari", jamMasuk: "16:00", jamPulang: "00:00" }
    ],
    absensi: [], kasbon: []
};
const simpanDB = () => localStorage.setItem('DB_ABSEN_GENZ', JSON.stringify(DB));

// ===== 2. CEK MODE KARYAWAN VS ADMIN =====
let isAdmin = false;
function cekMode() {
    const mode = new URLSearchParams(window.location.search).get('mode');
    isAdmin = mode === 'admin';
    
    if (!isAdmin) {
        // MODE KARYAWAN: Sembunyiin semua kecuali Absen
        ['btnRekap','btnGaji','btnSetting'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('judulUtama').innerHTML = '<i class="fa-solid fa-mug-hot text-amber-400 mr-2"></i>Absen Cafe Gen Z';
        document.getElementById('infoLisensi').textContent = 'Selamat bekerja!';
    } else {
        document.getElementById('judulUtama').textContent = DB.settings.NAMA_USAHA + ' - Dashboard';
    }
}

// ===== 3. SISTEM SEWA =====
function cekSewa() {
    const { TANGGAL_AKTIFASI, MASA_SEWA_HARI, KODE_LISENSI } = DB.settings;
    const tglExpired = new Date(TANGGAL_AKTIFASI);
    tglExpired.setDate(tglExpired.getDate() + MASA_SEWA_HARI);
    
    if(isAdmin) document.getElementById('infoLisensi').innerHTML = `Lisensi: ${KODE_LISENSI} | Aktif s/d: ${tglExpired.toLocaleDateString('id-ID')}`;
    
    if (new Date() > tglExpired) {
        document.getElementById('app').classList.add('kunci');
        document.getElementById('popupKunci').classList.remove('hidden');
        document.getElementById('kodeLisensiPopup').textContent = KODE_LISENSI;
        return false;
    }
    return true;
}

// ===== 4. KAMERA + ABSEN =====
let stream;
async function initKamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById('video').srcObject = stream;
    } catch (err) { document.getElementById('statusAbsen').textContent = 'Izinkan kamera & GPS'; }
}
function captureFoto() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    return canvas.toDataURL('image/jpeg', 0.4);
}
function prosesAbsen(tipe) {
    const idKaryawan = parseInt(document.getElementById('pilihKaryawan').value);
    if (!idKaryawan) return alert('Pilih nama dulu');
    navigator.geolocation.getCurrentPosition((pos) => {
        const { latitude, longitude } = pos.coords;
        const foto = captureFoto(); const now = new Date();
        const tgl = now.toISOString().slice(0,10); const jam = now.toTimeString().slice(0,8);
        let absenHariIni = DB.absensi.find(a => a.idKaryawan == idKaryawan && a.tanggal == tgl);
        if (tipe == 'masuk') {
            if (absenHariIni) return alert('Sudah absen masuk');
            const k = DB.karyawan.find(k => k.id == idKaryawan);
            const telatMenit = hitungTelat(jam, k.jamMasuk);
            DB.absensi.push({id:Date.now(),idKaryawan,tanggal:tgl,jamMasuk:jam,fotoMasuk:foto,lat:latitude,lng:longitude,status:telatMenit>0?'Telat':'Hadir',telatMenit});
        } else {
            if (!absenHariIni || absenHariIni.jamPulang) return alert('Belum absen masuk / sudah pulang');
            absenHariIni.jamPulang = jam; absenHariIni.fotoPulang = foto;
        }
        simpanDB(); updateTampilanAbsen(); renderRekap();
        document.getElementById('statusAbsen').textContent = `Berhasil absen ${tipe} jam ${jam}`;
    }, () => alert('Aktifkan GPS'));
}
function hitungTelat(jamMasuk, jamShift) {
    const [jM,mM] = jamMasuk.split(':').map(Number); const [jS,mS] = jamShift.split(':').map(Number);
    const menitMasuk = jM*60+mM; const menitShift = jS*60+mS; return menitMasuk > menitShift ? menitMasuk-menitShift : 0;
}
function updateTampilanAbsen() {
    const idK = parseInt(document.getElementById('pilihKaryawan').value);
    const absen = DB.absensi.find(a => a.idKaryawan == idK && a.tanggal == new Date().toISOString().slice(0,10));
    document.getElementById('btnAbsenMasuk').classList.toggle('hidden', absen && !absen.jamPulang);
    document.getElementById('btnAbsenPulang').classList.toggle('hidden', !absen || absen.jamPulang);
}

// ===== 5. REKAP + GAJI + SETTING ===== 
function renderRekap() {
    if (!isAdmin) return;
    const tgl = new Date().toISOString().slice(0,10);
    document.getElementById('tglHariIni').textContent = new Date().toLocaleDateString('id-ID');
    document.getElementById('tabelRekap').innerHTML = DB.karyawan.map(k => {
        const a = DB.absensi.find(x => x.idKaryawan == k.id && x.tanggal == tgl);
        return `<tr class="border-b border-slate-800">
            <td class="p-3">${k.nama}</td>
            <td class="text-center">${a?.jamMasuk||'-'}</td>
            <td class="text-center">${a?.jamPulang||'-'}</td>
            <td class="text-center"><span class="px-2 py-1 rounded text-xs ${a?.status=='Telat'?'bg-red-500/20 text-red-400':'bg-green-500/20 text-green-400'}">${a?.status||'Alpha'}</span></td>
            <td class="text-center">${a?.telatMenit||0}m</td>
            <td class="text-center">${a?`<img src="${a.fotoMasuk}" class="w-8 h-8 rounded-full mx-auto">`:'-'}</td>
        </tr>`;
    }).join('');
}
function hitungGaji() {
    const idK = parseInt(document.getElementById('pilihKaryawanGaji').value);
    const [tahun,bulan] = document.getElementById('pilihBulan').value.split('-').map(Number);
    if (!idK || !bulan) return alert('Lengkapi data');
    const k = DB.karyawan.find(x => x.id == idK);
    const absen = DB.absensi.filter(a => {const d=new Date(a.tanggal); return a.idKaryawan==idK && d.getMonth()+1==bulan && d.getFullYear()==tahun;});
    const kasbon = DB.kasbon.filter(x => {const d=new Date(x.tanggal); return x.idKaryawan==idK && d.getMonth()+1==bulan && d.getFullYear()==tahun;});
    let hariKerja = absen.filter(a=>a.status!='Alpha').length;
    let totalTelat = absen.reduce((s,a)=>s+(a.telatMenit||0),0);
    let jamLembur = 0; absen.forEach(a=>{if(a.jamPulang){const j=(new Date(`2000-01-01 ${a.jamPulang}`)-new Date(`2000-01-01 ${a.jamMasuk}`))/3600000; if(j>DB.settings.JAM_KERJA_STANDAR) jamLembur+=j-DB.settings.JAM_KERJA_STANDAR;}});
    const gajiKotor = hariKerja*DB.settings.GAJI_HARIAN;
    const denda = totalTelat*DB.settings.DENDA_TELAT_PER_MENIT;
    const lembur = Math.floor(jamLembur)*DB.settings.UPAH_LEMBUR_PER_JAM;
    const totalKasbon = kasbon.reduce((s,x)=>s+x.jumlah,0);
    const bersih = gajiKotor-denda-totalKasbon+lembur;
    document.getElementById('namaKaryawanGaji').textContent = k.nama;
    document.getElementById('rincianGaji').innerHTML = `
        <div class="flex justify-between"><span>Hari Kerja:</span><span>${hariKerja} hari</span></div>
        <div class="flex justify-between"><span>Gaji Pokok:</span><span>Rp ${gajiKotor.toLocaleString('id-ID')}</span></div>
        <div class="flex justify-between text-red-400"><span>Denda ${totalTelat}mnt:</span><span>- Rp ${denda.toLocaleString('id-ID')}</span></div>
        <div class="flex justify-between text-red-400"><span>Kasbon:</span><span>- Rp ${totalKasbon.toLocaleString('id-ID')}</span></div>
        <div class="flex justify-between text-green-400"><span>Lembur ${Math.floor(jamLembur)}jam:</span><span>+ Rp ${lembur.toLocaleString('id-ID')}</span></div>
        <div class="flex justify-between font-bold border-t border-slate-700 pt-2 mt-2 text-lg"><span>GAJI BERSIH:</span><span>Rp ${bersih.toLocaleString('id-ID')}</span></div>`;
    document.getElementById('hasilGaji').classList.remove('hidden');
}
function tambahKasbon() {
    const idK = parseInt(document.getElementById('pilihKaryawanKasbon').value);
    const jml = parseInt(document.getElementById('jumlahKasbon').value);
    if (!idK || !jml) return alert('Lengkapi');
    DB.kasbon.push({id:Date.now(),idKaryawan:idK,tanggal:new Date().toISOString().slice(0,10),jumlah:jml});
    simpanDB(); document.getElementById('jumlahKasbon').value = ''; alert('Kasbon tersimpan');
}
function renderSetting() {
    document.getElementById('setGajiHarian').value = DB.settings.GAJI_HARIAN;
    document.getElementById('setDendaTelat').value = DB.settings.DENDA_TELAT_PER_MENIT;
    document.getElementById('setUpahLembur').value = DB.settings.UPAH_LEMBUR_PER_JAM;
    document.getElementById('setJamKerja').value = DB.settings.JAM_KERJA_STANDAR;
    document.getElementById('listKaryawan').innerHTML = DB.karyawan.map(k=>`
        <div class="flex justify-between items-center bg-slate-800 rounded-lg p-3">
            <span>${k.nama} | ${k.jamMasuk}-${k.jamPulang}</span>
            <button onclick="hapusKaryawan(${k.id})" class="text-red-500"><i class="fa-solid fa-trash"></i></button>
        </div>`).join('');
}
function simpanSetting() {
    DB.settings.GAJI_HARIAN = parseInt(document.getElementById('setGajiHarian').value);
    DB.settings.DENDA_TELAT_PER_MENIT = parseInt(document.getElementById('setDendaTelat').value);
    DB.settings.UPAH_LEMBUR_PER_JAM = parseInt(document.getElementById('setUpahLembur').value);
    DB.settings.JAM_KERJA_STANDAR = parseInt(document.getElementById('setJamKerja').value);
    simpanDB(); alert('Setting tersimpan');
}
function tambahKaryawan() {
    const nama = document.getElementById('namaKaryawanBaru').value;
    const jamMasuk = document.getElementById('jamMasukBaru').value;
    if (!nama || !jamMasuk) return alert('Lengkapi');
    DB.karyawan.push({id:Date.now(),nama,jamMasuk,jamPulang:"17:00"}); simpanDB(); renderSetting(); loadDropdownKaryawan();
}
function hapusKaryawan(id) {
    if (confirm('Hapus?')) { DB.karyawan = DB.karyawan.filter(k=>k.id!=id); simpanDB(); renderSetting(); loadDropdownKaryawan(); }
}

// ===== 6. UI HELPER =====
function gantiTab(nama) {
    if (!isAdmin && nama !== 'absen') return;
    if (isAdmin && (nama==='gaji'||nama==='setting')) {
        const pin = prompt('Masukkan PIN Admin:');
        if (pin !== DB.settings.PIN_ADMIN) return alert('PIN Salah');
    }
    document.querySelectorAll('.tab-content').forEach(el=>el.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(el=>{
        el.classList.remove('bg-indigo-600','text-white'); el.classList.add('glass');
    });
    document.getElementById('tab'+nama.charAt(0).toUpperCase()+nama.slice(1)).classList.remove('hidden');
    document.getElementById('btn'+nama.charAt(0).toUpperCase()+nama.slice(1)).classList.add('bg-indigo-600','text-white');
    document.getElementById('btn'+nama.charAt(0).toUpperCase()+nama.slice(1)).classList.remove('glass');
}
function loadDropdownKaryawan() {
    const opsi = DB.karyawan.map(k=>`<option value="${k.id}">${k.nama}</option>`).join('');
    ['pilihKaryawan','pilihKaryawanGaji','pilihKaryawanKasbon'].forEach(id=>{
        document.getElementById(id).innerHTML = '<option value="">Pilih Karyawan</option>' + opsi;
    });
}

// ===== 7. INIT =====
window.onload = () => {
    if (!cekSewa()) return;
    cekMode(); initKamera(); loadDropdownKaryawan(); renderRekap(); renderSetting();
    document.getElementById('pilihKaryawan').addEventListener('change', updateTampilanAbsen);
    document.getElementById('pilihBulan').value = new Date().toISOString().slice(0,7);
};
</script>
</body>
    </html>
